services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: strapi
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d strapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  strapi:
    build: ./strapi
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - strapi_uploads:/app/public/uploads
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      STRAPI_PLUGIN_I18N_INIT_LOCALE_CODE: en
      NODE_ENV: production
    # Port 1337 is NOT exposed to the host; Nginx proxies /strapi/ internally.
    expose:
      - "1337"

  next:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - strapi
    environment:
      STRAPI_API_URL: http://strapi:1337
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      INQUIRY_RECIPIENT: ${INQUIRY_RECIPIENT}
      NODE_ENV: production
    # Port 3000 is NOT exposed to the host; Nginx proxies /* internally.
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - next
      - strapi
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - strapi_uploads:/var/www/uploads:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  strapi_uploads:
