# ==============================================================
# Jiayi Tools Website — Nginx Configuration
#
# Routing:
#   /strapi/    → strapi:1337    (Strapi admin + public API)
#   /uploads/   → local volume   (static media, long-lived cache)
#   /*          → next:3000      (Next.js App Router, SSR/ISR)
#
# TLS:
#   Certificates managed by Certbot / Let's Encrypt on the host.
#   The /etc/letsencrypt directory is mounted read-only into this
#   container; renew certs with: certbot renew && docker compose
#   exec nginx nginx -s reload
# ==============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    application/x-javascript text/xml application/xml
                    application/xml+rss text/javascript image/svg+xml;

    # ----------------------------------------------------------
    # HTTP → HTTPS redirect (port 80)
    # ----------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Allow Let's Encrypt ACME challenge through HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----------------------------------------------------------
    # HTTPS — main virtual host (port 443)
    # ----------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # ---- TLS certificates (Let's Encrypt / Certbot) ----
        # Replace "yourdomain.com" with the actual domain.
        ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

        # Modern TLS settings
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (enable after confirming TLS works correctly)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # OCSP stapling
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 50m;

        # ----------------------------------------------------------
        # /strapi/ → Strapi CMS (admin UI + public REST API)
        # ----------------------------------------------------------
        location /strapi/ {
            proxy_pass         http://strapi:1337/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 90s;

            # Strip the /strapi prefix before forwarding
            rewrite ^/strapi/(.*)$ /$1 break;
        }

        # ----------------------------------------------------------
        # /uploads/ → strapi_uploads volume (static media files)
        # Served directly by Nginx — no Node.js overhead.
        # 7-day immutable cache as required by Requirement 10.4
        # ----------------------------------------------------------
        location /uploads/ {
            alias /var/www/uploads/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;

            # Prevent access to dot-files
            location ~ /\. {
                deny all;
            }
        }

        # ----------------------------------------------------------
        # Static assets (JS, CSS, fonts) — long-lived cache
        # Requirement 10.4: minimum 7-day cache lifetime
        # ----------------------------------------------------------
        location ~* \.(js|css|woff2|woff|ttf|otf|png|jpg|jpeg|webp|avif|ico|svg)$ {
            proxy_pass         http://next:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable" always;
        }

        # ----------------------------------------------------------
        # /* → Next.js (SSR / App Router)
        # ----------------------------------------------------------
        location / {
            proxy_pass         http://next:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 90s;
        }
    }
}
